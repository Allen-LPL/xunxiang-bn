{{:ModuleInclude('public/header')}}

<!-- right content start  -->
<div class="content-right">
    <div class="content">
        <!-- nav -->
        {{:ModuleInclude('public/plugins_admin_nav', [
            'plugins'   => 'giftcard',
            'title'     => MyLang('base_config_title'),
            'back_url'  => PluginsAdminUrl('giftcard', 'admin', 'index'),
        ])}}

        <!-- form start -->
        <form class="am-form form-validation am-form-full-screen am-form-popup-sticky" action="{{:PluginsAdminUrl('giftcard', 'admin', 'save')}}" method="POST" request-type="ajax-url" request-value="{{:PluginsAdminUrl('giftcard', 'admin', 'index')}}">
            <div class="am-form-group">
                <label class="am-block">开启用户中心菜单入口</label>
                <input name="is_user_menu" value="1" type="checkbox" data-off-text="{{:MyLang('no_title')}}" data-on-text="{{:MyLang('yes_title')}}" data-size="xs" data-on-color="success" data-off-color="default" data-handle-width="50" data-am-switch {{if isset($data['is_user_menu']) and $data['is_user_menu'] eq 1}}checked="true"{{/if}} />
            </div>
            <div class="am-form-group">
                <label class="am-block">用户中心菜单入口名称<span class="am-form-group-label-tips">默认 我的礼品卡</span></label>
                <input type="text" name="user_menu_name" placeholder="用户中心菜单入口名称" class="am-radius" {{if !empty($data['user_menu_name'])}} value="{{$data.user_menu_name}}"{{/if}} />
            </div>
            <div class="am-form-group">
                <label class="am-block">开启礼品卡兑换入口</label>
                <input name="is_card_exchange" value="1" type="checkbox" data-off-text="{{:MyLang('no_title')}}" data-on-text="{{:MyLang('yes_title')}}" data-size="xs" data-on-color="success" data-off-color="default" data-handle-width="50" data-am-switch {{if isset($data['is_card_exchange']) and $data['is_card_exchange'] eq 1}}checked="true"{{/if}} />
            </div>
            <div class="am-form-group">
                <label class="am-block">开启商品兑换<span class="am-form-group-label-tips">用户存在未兑换的商品券</span></label>
                <input name="is_goods_exchange" value="1" type="checkbox" data-off-text="{{:MyLang('no_title')}}" data-on-text="{{:MyLang('yes_title')}}" data-size="xs" data-on-color="success" data-off-color="default" data-handle-width="50" data-am-switch {{if isset($data['is_goods_exchange']) and $data['is_goods_exchange'] eq 1}}checked="true"{{/if}} />
            </div>
            <div class="am-form-group">
                <label class="am-block">商品详情页面按钮兑换名称<span class="am-form-group-label-tips">默认 免费兑换</span></label>
                <input type="text" name="goods_detail_buy_btn_exchange_text" placeholder="商品详情页面按钮兑换名称" class="am-radius" {{if !empty($data['goods_detail_buy_btn_exchange_text'])}} value="{{$data.goods_detail_buy_btn_exchange_text}}"{{/if}} />
            </div>

            <!-- 基础配置 -->
            <div class="am-form-popup-submit">
                <a href="{{:PluginsAdminUrl('giftcard', 'admin', 'index', $params)}}" class="am-btn am-btn-warning am-radius am-btn-xs am-margin-right-lg">
                    <i class="am-icon-mail-reply"></i>
                    <span>{{:MyLang('retreat_title')}}</span>
                </a>
                <button type="submit" class="am-btn am-btn-primary am-radius am-btn-xs btn-loading-example" data-am-loading="{spinner: 'circle-o-notch', loadingText:'{{:MyLang('save_title')}}'}">
                    <i class="am-icon-save"></i>
                    <span>{{:MyLang('save_title')}}</span>
                </button>
            </div>
        </form>
        <!-- form end -->
    </div>
</div>
<!-- right content end  -->

<!-- footer start -->
{{:ModuleInclude('public/footer')}}
